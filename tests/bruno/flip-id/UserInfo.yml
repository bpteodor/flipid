info:
  name: UserInfo
  type: http
  seq: 1

http:
  method: GET
  url: "{{flipidURL}}/op/userinfo"
  auth:
    type: oauth2
    flow: authorization_code
    authorizationUrl: "{{flipidURL}}/op/authorize"
    accessTokenUrl: "{{flipidURL}}/op/token"
    callbackUrl: http://localhost:8080/callback
    credentials:
      clientId: test-app1
      clientSecret: secret
      placement: basic_auth_header
    scope: openid profile email phone address
    state: sdfsdf
    pkce:
      disabled: true
    tokenConfig:
      id: token-app1
      placement:
        header: Bearer
    settings:
      autoFetchToken: true
      autoRefreshToken: false

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
