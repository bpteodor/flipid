info:
  name: Introspect
  type: http
  seq: 1

http:
  method: POST
  url: "{{flipidURL}}/oauth2/token_info"
  body:
    type: form-urlencoded
    data:
      - name: token
        value: "{{$oauth2.token-app1.access_token}}"
      - name: token_type_hint
        value: access_token
        disabled: true
  auth:
    type: basic
    username: test-app1
    password: secret

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
